<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7B9EC4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" fill="#FAFBFD" rx="10"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">AI API 中转服务技术架构</text>

  <!-- Client SDK -->
  <rect x="320" y="50" width="220" height="52" rx="8" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="1.2"/>
  <text x="430" y="73" text-anchor="middle" fill="#3D6A99" font-size="13" font-weight="600">Client SDK</text>
  <text x="430" y="91" text-anchor="middle" fill="#6B8EAF" font-size="10">OpenAI SDK / HTTP Client</text>

  <!-- Arrow down -->
  <line x1="430" y1="102" x2="430" y2="130" stroke="#7B9EC4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="448" y="121" fill="#8AA4BD" font-size="9">HTTPS</text>

  <!-- Relay box -->
  <rect x="50" y="134" width="760" height="280" rx="10" fill="#F3F6FA" stroke="#C5D3E3" stroke-width="1.2"/>
  <text x="430" y="158" text-anchor="middle" fill="#3D6A99" font-size="14" font-weight="700">中转服务（Relay Gateway）</text>

  <!-- Auth -->
  <rect x="85" y="175" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#B8D0E8" stroke-width="1"/>
  <text x="155" y="197" text-anchor="middle" fill="#3D6A99" font-size="12" font-weight="600">🔐 Auth 鉴权</text>
  <text x="155" y="214" text-anchor="middle" fill="#7B9EC4" font-size="9">JWT / API Key 校验</text>

  <!-- Arrow → -->
  <line x1="225" y1="200" x2="268" y2="200" stroke="#7B9EC4" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Router -->
  <rect x="275" y="175" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#B8D0E8" stroke-width="1"/>
  <text x="345" y="197" text-anchor="middle" fill="#3D6A99" font-size="12" font-weight="600">🔀 Router 路由</text>
  <text x="345" y="214" text-anchor="middle" fill="#7B9EC4" font-size="9">模型名映射 + 权重</text>

  <!-- Arrow → -->
  <line x1="415" y1="200" x2="458" y2="200" stroke="#7B9EC4" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Billing -->
  <rect x="465" y="175" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#B8D0E8" stroke-width="1"/>
  <text x="535" y="197" text-anchor="middle" fill="#3D6A99" font-size="12" font-weight="600">💰 计费模块</text>
  <text x="535" y="214" text-anchor="middle" fill="#7B9EC4" font-size="9">Token 计量 + 扣费</text>

  <!-- Load Balancer -->
  <rect x="650" y="175" width="136" height="50" rx="6" fill="#FFFFFF" stroke="#B8D0E8" stroke-width="1"/>
  <text x="718" y="197" text-anchor="middle" fill="#3D6A99" font-size="12" font-weight="600">⚖️ 负载均衡</text>
  <text x="718" y="214" text-anchor="middle" fill="#7B9EC4" font-size="9">加权随机 / 轮询</text>

  <!-- Channel Pool -->
  <rect x="85" y="250" width="700" height="145" rx="8" fill="#FFFFFF" stroke="#D4DFE9" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="435" y="273" text-anchor="middle" fill="#5A7D9A" font-size="12" font-weight="600">Channel Pool（渠道池）</text>

  <!-- Ch-1 -->
  <rect x="108" y="286" width="140" height="90" rx="6" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="1"/>
  <text x="178" y="308" text-anchor="middle" fill="#3D6A99" font-size="11" font-weight="600">Ch-1  ·  OpenAI</text>
  <text x="178" y="326" text-anchor="middle" fill="#7B9EC4" font-size="9">api.openai.com</text>
  <rect x="130" y="338" width="96" height="18" rx="4" fill="#E8F5EE" stroke="#A3D4B5" stroke-width="0.8"/>
  <text x="178" y="351" text-anchor="middle" fill="#4D8B65" font-size="9">官转 1.0x</text>

  <!-- Ch-2 -->
  <rect x="268" y="286" width="140" height="90" rx="6" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="1"/>
  <text x="338" y="308" text-anchor="middle" fill="#3D6A99" font-size="11" font-weight="600">Ch-2  ·  Azure</text>
  <text x="338" y="326" text-anchor="middle" fill="#7B9EC4" font-size="9">xxx.openai.azure.com</text>
  <rect x="290" y="338" width="96" height="18" rx="4" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="0.8"/>
  <text x="338" y="351" text-anchor="middle" fill="#5A7D9A" font-size="9">AZ转 0.9x</text>

  <!-- Ch-3 -->
  <rect x="428" y="286" width="140" height="90" rx="6" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="1"/>
  <text x="498" y="308" text-anchor="middle" fill="#3D6A99" font-size="11" font-weight="600">Ch-3  ·  Anthropic</text>
  <text x="498" y="326" text-anchor="middle" fill="#7B9EC4" font-size="9">api.anthropic.com</text>
  <rect x="450" y="338" width="96" height="18" rx="4" fill="#E8F5EE" stroke="#A3D4B5" stroke-width="0.8"/>
  <text x="498" y="351" text-anchor="middle" fill="#4D8B65" font-size="9">官转 1.0x</text>

  <!-- Ch-N -->
  <rect x="588" y="286" width="175" height="90" rx="6" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="1"/>
  <text x="675" y="308" text-anchor="middle" fill="#3D6A99" font-size="11" font-weight="600">Ch-N  ·  逆向 / 号池</text>
  <text x="675" y="326" text-anchor="middle" fill="#7B9EC4" font-size="9">非公开 endpoint</text>
  <rect x="622" y="338" width="106" height="18" rx="4" fill="#FDF2E9" stroke="#E0C5A0" stroke-width="0.8"/>
  <text x="675" y="351" text-anchor="middle" fill="#A07842" font-size="9">逆向 0.3x ⚠</text>

  <!-- Arrows down from channels -->
  <line x1="178" y1="414" x2="178" y2="440" stroke="#7B9EC4" stroke-width="1.2"/>
  <line x1="338" y1="414" x2="338" y2="440" stroke="#7B9EC4" stroke-width="1.2"/>
  <line x1="498" y1="414" x2="498" y2="440" stroke="#7B9EC4" stroke-width="1.2"/>
  <line x1="675" y1="414" x2="675" y2="440" stroke="#7B9EC4" stroke-width="1.2"/>

  <!-- Upstream -->
  <rect x="85" y="442" width="690" height="55" rx="8" fill="#E8F5EE" stroke="#A3D4B5" stroke-width="1.2"/>
  <text x="430" y="465" text-anchor="middle" fill="#3B7A57" font-size="13" font-weight="600">上游 AI API Provider 集群</text>
  <text x="430" y="484" text-anchor="middle" fill="#5A9A73" font-size="10">api.openai.com  ·  api.anthropic.com  ·  generativelanguage.googleapis.com  ·  ...</text>

  <!-- Legend -->
  <rect x="50" y="520" width="760" height="36" rx="6" fill="#F3F6FA" stroke="#D4DFE9" stroke-width="1"/>
  <rect x="80" y="531" width="10" height="10" rx="2" fill="#E8F5EE" stroke="#A3D4B5" stroke-width="0.8"/>
  <text x="96" y="541" fill="#5A7D9A" font-size="10">官转渠道</text>
  <rect x="180" y="531" width="10" height="10" rx="2" fill="#EBF2FA" stroke="#B8D0E8" stroke-width="0.8"/>
  <text x="196" y="541" fill="#5A7D9A" font-size="10">Azure 渠道</text>
  <rect x="290" y="531" width="10" height="10" rx="2" fill="#FDF2E9" stroke="#E0C5A0" stroke-width="0.8"/>
  <text x="306" y="541" fill="#5A7D9A" font-size="10">逆向/号池渠道</text>
</svg>
